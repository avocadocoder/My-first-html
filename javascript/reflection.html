<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reflection Visualizer</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow:hidden;
    background:#050816;
    color:white;
}

canvas{
    display:block;
}

.panel{
    position:absolute;
    top:20px;
    left:20px;
    width:340px;
    background:rgba(0,0,0,0.65);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:18px;
    padding:20px;
    backdrop-filter:blur(12px);
}

h1{
    font-size:24px;
    margin-bottom:15px;
    color:#00e5ff;
}

.desc{
    color:#cfd8dc;
    line-height:1.5;
    margin-bottom:18px;
}

.slider-box{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:10px;
    font-weight:bold;
}

input[type=range]{
    width:100%;
}

.value{
    margin-top:8px;
    color:#00e5ff;
    font-size:18px;
}

.law{
    margin-top:20px;
    padding:15px;
    border-radius:12px;
    background:rgba(0,229,255,0.08);
    border:1px solid rgba(0,229,255,0.2);
    line-height:1.6;
}

.highlight{
    color:#00e5ff;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="panel">

    <h1>🔬 Reflection of Light</h1>

    <div class="desc">
        Move the slider to change the
        <span class="highlight">Angle of Incidence</span>.

        Notice how the
        <span class="highlight">Angle of Reflection</span>
        changes automatically.

        The law of reflection says:
    </div>

    <div class="law">
        Angle of Incidence = Angle of Reflection
        <br><br>
        θi = θr
    </div>

    <div class="slider-box">
        <label>Angle of Incidence</label>
        <input id="angleSlider" type="range" min="10" max="70" value="35">
        <div class="value" id="angleValue">35°</div>
    </div>

</div>

<canvas id="canvas"></canvas>

<script>

////////////////////////////////////////////////////////
// CANVAS
////////////////////////////////////////////////////////

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();

window.addEventListener("resize", resizeCanvas);

////////////////////////////////////////////////////////
// UI
////////////////////////////////////////////////////////

const angleSlider = document.getElementById("angleSlider");
const angleValue = document.getElementById("angleValue");

let incidenceAngle = parseFloat(angleSlider.value);

angleSlider.addEventListener("input", () => {
    incidenceAngle = parseFloat(angleSlider.value);
    angleValue.innerText = incidenceAngle + "°";
});

////////////////////////////////////////////////////////
// MAIN ANIMATION
////////////////////////////////////////////////////////

let pulse = 0;

function animate(){

    requestAnimationFrame(animate);

    pulse += 0.03;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawBackground();

    ////////////////////////////////////////////////////
    // MIRROR POSITION
    ////////////////////////////////////////////////////

    const mirrorY = canvas.height * 0.78;

    const centerX = canvas.width * 0.68;

    ////////////////////////////////////////////////////
    // NORMAL LINE
    ////////////////////////////////////////////////////

    const normalTop = {
        x:centerX,
        y:mirrorY - 260
    };

    const normalBottom = {
        x:centerX,
        y:mirrorY + 40
    };

    ////////////////////////////////////////////////////
    // ANGLE CALCULATIONS
    ////////////////////////////////////////////////////

    const angleRad = incidenceAngle * Math.PI / 180;

    const rayLength = 320;

    ////////////////////////////////////////////////////
    // INCIDENT RAY
    ////////////////////////////////////////////////////

    const incidentStart = {
        x:centerX - Math.sin(angleRad) * rayLength,
        y:mirrorY - Math.cos(angleRad) * rayLength
    };

    const hitPoint = {
        x:centerX,
        y:mirrorY
    };

    ////////////////////////////////////////////////////
    // REFLECTED RAY
    ////////////////////////////////////////////////////

    const reflectedEnd = {
        x:centerX + Math.sin(angleRad) * rayLength,
        y:mirrorY - Math.cos(angleRad) * rayLength
    };

    ////////////////////////////////////////////////////
    // DRAW MIRROR
    ////////////////////////////////////////////////////

    drawMirror(mirrorY);

    ////////////////////////////////////////////////////
    // DRAW NORMAL
    ////////////////////////////////////////////////////

    drawNormal(normalTop, normalBottom);

    ////////////////////////////////////////////////////
    // DRAW INCIDENT RAY
    ////////////////////////////////////////////////////

    drawLaser(
        incidentStart,
        hitPoint,
        "#00d9ff"
    );

    ////////////////////////////////////////////////////
    // DRAW REFLECTED RAY
    ////////////////////////////////////////////////////

    drawLaser(
        hitPoint,
        reflectedEnd,
        "#00ff88"
    );

    ////////////////////////////////////////////////////
    // ANIMATED PARTICLES
    ////////////////////////////////////////////////////

    animateBeamParticles(incidentStart, hitPoint, "#00d9ff");

    animateBeamParticles(hitPoint, reflectedEnd, "#00ff88");

    ////////////////////////////////////////////////////
    // ANGLE ARCS
    ////////////////////////////////////////////////////

    drawAngleArc(
        centerX,
        mirrorY,
        -Math.PI/2,
        -Math.PI/2 - angleRad,
        "#00d9ff"
    );

    drawAngleArc(
        centerX,
        mirrorY,
        -Math.PI/2,
        -Math.PI/2 + angleRad,
        "#00ff88"
    );

    ////////////////////////////////////////////////////
    // LABELS
    ////////////////////////////////////////////////////

    drawLabels(
        centerX,
        mirrorY,
        angleRad
    );
}

////////////////////////////////////////////////////////
// BACKGROUND
////////////////////////////////////////////////////////

function drawBackground(){

    const gradient = ctx.createRadialGradient(
        canvas.width/2,
        canvas.height/2,
        100,
        canvas.width/2,
        canvas.height/2,
        canvas.width
    );

    gradient.addColorStop(0,"#101830");
    gradient.addColorStop(1,"#050816");

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

////////////////////////////////////////////////////////
// MIRROR
////////////////////////////////////////////////////////

function drawMirror(y){

    ctx.beginPath();

    ctx.moveTo(120,y);
    ctx.lineTo(canvas.width - 120,y);

    ctx.lineWidth = 12;
    ctx.strokeStyle = "#dfe6e9";

    ctx.shadowBlur = 20;
    ctx.shadowColor = "white";

    ctx.stroke();

    ctx.shadowBlur = 0;

    ////////////////////////////////////////////////////
    // Mirror Label
    ////////////////////////////////////////////////////

    ctx.fillStyle = "#ffffff";
    ctx.font = "20px Arial";

    ctx.fillText(
        "Plane Mirror",
        canvas.width - 300,
        y + 50
    );
}

////////////////////////////////////////////////////////
// NORMAL
////////////////////////////////////////////////////////

function drawNormal(top,bottom){

    ctx.beginPath();

    ctx.moveTo(top.x,top.y);
    ctx.lineTo(bottom.x,bottom.y);

    ctx.setLineDash([10,10]);

    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = 2;

    ctx.stroke();

    ctx.setLineDash([]);

    ctx.fillStyle = "#ffffff";
    ctx.font = "18px Arial";

    ctx.fillText(
        "Normal",
        top.x + 15,
        top.y + 20
    );
}

////////////////////////////////////////////////////////
// LASER
////////////////////////////////////////////////////////

function drawLaser(start,end,color){

    ctx.beginPath();

    ctx.moveTo(start.x,start.y);
    ctx.lineTo(end.x,end.y);

    ctx.lineWidth = 5;

    ctx.strokeStyle = color;

    ctx.shadowBlur = 25;
    ctx.shadowColor = color;

    ctx.stroke();

    ctx.shadowBlur = 0;
}

////////////////////////////////////////////////////////
// PARTICLES
////////////////////////////////////////////////////////

function animateBeamParticles(start,end,color){

    const count = 22;

    for(let i=0;i<count;i++){

        const t = ((i / count) + pulse) % 1;

        const x = start.x + (end.x - start.x) * t;
        const y = start.y + (end.y - start.y) * t;

        ctx.beginPath();

        ctx.arc(x,y,3,0,Math.PI*2);

        ctx.fillStyle = color;

        ctx.shadowBlur = 15;
        ctx.shadowColor = color;

        ctx.fill();

        ctx.shadowBlur = 0;
    }
}

////////////////////////////////////////////////////////
// ANGLE ARC
////////////////////////////////////////////////////////

function drawAngleArc(x,y,start,end,color){

    ctx.beginPath();

    ctx.arc(
        x,
        y,
        70,
        start,
        end,
        end < start
    );

    ctx.lineWidth = 4;
    ctx.strokeStyle = color;

    ctx.stroke();
}

////////////////////////////////////////////////////////
// LABELS
////////////////////////////////////////////////////////

function drawLabels(x,y,angle){

    ////////////////////////////////////////////////////
    // Incident Label
    ////////////////////////////////////////////////////

    ctx.fillStyle = "#00d9ff";
    ctx.font = "20px Arial";

    ctx.fillText(
        "Angle of Incidence",
        x - 280,
        y - 140
    );

    ctx.fillText(
        incidenceAngle + "°",
        x - 70,
        y - 85
    );

    ////////////////////////////////////////////////////
    // Reflection Label
    ////////////////////////////////////////////////////

    ctx.fillStyle = "#00ff88";

    ctx.fillText(
        "Angle of Reflection",
        x + 40,
        y - 140
    );

    ctx.fillText(
        incidenceAngle + "°",
        x + 45,
        y - 85
    );

    ////////////////////////////////////////////////////
    // Ray Labels
    ////////////////////////////////////////////////////

    ctx.fillStyle = "#00d9ff";

    ctx.fillText(
        "Incident Ray",
        x - 260,
        y - 250
    );

    ctx.fillStyle = "#00ff88";

    ctx.fillText(
        "Reflected Ray",
        x + 120,
        y - 250
    );
}

////////////////////////////////////////////////////////
// START
////////////////////////////////////////////////////////

animate();

</script>

</body>
</html>
