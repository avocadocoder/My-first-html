<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ocean Gallery</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ================= CUSTOM STYLES ================= */

/* Image hover zoom effect */
.gallery-img {
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    cursor: pointer;
    height: 250px;
    object-fit: cover;
    width: 100%;
}

.gallery-img:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* Section spacing */
.section-title {
    margin-top: 40px;
    margin-bottom: 20px;
}

/* Modal image styling */
.modal-img {
    width: 100%;
}
</style>

</head>

<body>

<div class="container my-5">

<h1 class="text-center mb-4">🌊 Ocean Gallery</h1>
<p class="text-center text-muted">Explore the beauty of oceans through different perspectives</p>

<!-- ================= CATEGORY TABS ================= -->
<ul class="nav nav-pills justify-content-center mb-4" id="galleryTabs">

<li class="nav-item">
<button class="nav-link active" data-bs-toggle="pill" data-bs-target="#waves">Waves</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="pill" data-bs-target="#marine">Marine Life</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="pill" data-bs-target="#beaches">Beaches</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="pill" data-bs-target="#deep">Deep Ocean</button>
</li>

</ul>

<!-- ================= TAB CONTENT ================= -->
<div class="tab-content">

<!-- ================= WAVES ================= -->
<div class="tab-pane fade show active" id="waves">
<div class="row g-3">

<!-- 6 Images -->
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" class="gallery-img rounded" onclick="openModal(this.src)"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21" class="gallery-img rounded" onclick="openModal(this.src)"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1519046904884-53103b34b206" class="gallery-img rounded" onclick="openModal(this.src)"></div>

<div class="col-md-4"><img src="https://images.unsplash.com/photo-1493558103817-58b2924bce98" class="gallery-img rounded" onclick="openModal(this.src)"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21?2" class="gallery-img rounded" onclick="openModal(this.src)"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?2" class="gallery-img rounded" onclick="openModal(this.src)"></div>

</div>
</div>

<!-- ================= MARINE LIFE ================= -->
<div class="tab-pane fade" id="marine">
<div class="row g-3">

<div class="col-md-4"><img src="https://images.unsplash.com/photo-1470115636492-6d2b56f9146d" class="gallery-img rounded" onclick="openModal(this.src)"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29" class="gallery-img rounded" onclick="openModal(this.src)"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1501959915551-4e8d30928317" class="gallery-img rounded" onclick="openModal(this.src)"></div>

<div class="col-md-4"><img src="https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9" class="gallery-img rounded" onclick="openModal(this.src)"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1508182311256-e3f8c8d07c9b" class="gallery-img rounded" onclick="openModal(this.src)"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1508672019048-805c876b67e2" class="gallery-img rounded" onclick="openModal(this.src)"></div>

</div>
</div>

<!-- ================= BEACHES ================= -->
<div class="tab-pane fade" id="beaches">
<div class="row g-3">

<div class="col-md-4"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" class="gallery-img rounded"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1493558103817-58b2924bce98" class="gallery-img rounded"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21" class="gallery-img rounded"></div>

<div class="col-md-4"><img src="https://images.unsplash.com/photo-1504608524841-42fe6f032b4b" class="gallery-img rounded"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1519046904884-53103b34b206" class="gallery-img rounded"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1501959915551-4e8d30928317" class="gallery-img rounded"></div>

</div>
</div>

<!-- ================= DEEP OCEAN ================= -->
<div class="tab-pane fade" id="deep">
<div class="row g-3">

<div class="col-md-4"><img src="https://images.unsplash.com/photo-1504608524841-42fe6f032b4b" class="gallery-img rounded"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29" class="gallery-img rounded"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1508672019048-805c876b67e2" class="gallery-img rounded"></div>

<div class="col-md-4"><img src="https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9" class="gallery-img rounded"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1508182311256-e3f8c8d07c9b" class="gallery-img rounded"></div>
<div class="col-md-4"><img src="https://images.unsplash.com/photo-1470115636492-6d2b56f9146d" class="gallery-img rounded"></div>

</div>
</div>

</div>
</div>

<!-- ================= MODAL (LIGHTBOX) ================= -->
<div class="modal fade" id="imageModal" tabindex="-1">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content">

<div class="modal-body">
<img id="modalImage" class="modal-img">
</div>

</div>
</div>
</div>

<!-- ================= JS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Function to open modal with clicked image
function openModal(src) {
    document.getElementById("modalImage").src = src;
    var myModal = new bootstrap.Modal(document.getElementById('imageModal'));
    myModal.show();
}
</script>

</body>
</html>
