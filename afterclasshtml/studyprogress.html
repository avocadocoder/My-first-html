<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Progress Dashboard</title>
    <link rel="stylesheet" href=

    "https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <script src=

    "https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

    </script>

</head>
<body>

<div class="container mt-4">

    <!-- Header -->
    <div class="p-4 bg-light rounded">
        <h1>My Study Progress Dashboard</h1>
        <p>Here is my study progress using Bootstrap.</p>
    </div>

    <br>

    <h3>Subjects</h3>

    <button class="btn btn-primary">Math</button>
    <button class="btn btn-success">Science</button>
    <button class="btn btn-warning">English</button>
    <button class="btn btn-danger">History</button>

    <hr>

    <h3>Lessons</h3>

    <p>Math <span class="badge bg-primary">10</span></p>
    <p>Science <span class="badge bg-success">8</span></p>
    <p>English <span class="badge bg-warning text-dark">12</span></p>
    <p>History <span class="badge bg-danger">6</span></p>

    <hr>

    <h3>Progress</h3>

    <p>Math</p>
    <div class="progress">
        <div class="progress-bar bg-primary" style="width:70%;">70%</div>
    </div>

    <br>

    <p>Science</p>
    <div class="progress">
        <div class="progress-bar bg-success" style="width:50%;">50%</div>
    </div>

    <br>

    <p>English</p>
    <div class="progress">
        <div class="progress-bar bg-warning text-dark" style="width:90%;">90%</div>
    </div>

    <br>

    <p>History</p>
    <div class="progress">
        <div class="progress-bar bg-danger" style="width:40%;">40%</div>
    </div>

</div>

</body>
</html>
